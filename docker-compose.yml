version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
    restart: always

  inference:
    build: .
    command: python scripts/inference_worker.py
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
    deploy:
      replicas: 2
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: always

volumes:
  mongo_data:
